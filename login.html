<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In — StudyFast</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#08080e;--s1:#0f0f1a;--s2:#161625;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--gold:#F7A600;--gold2:#F7BD33;--text:#f2f1fc;--muted:#6a6a90;--muted2:#9090b0;--r:14px;--r-sm:8px;--green:#3dffa0;--orange:#ff6b35}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif}
header{padding:12px 32px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(8,8,14,0.88);backdrop-filter:blur(16px);position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo img{height:48px;opacity:0.92}
.header-right{font-size:13px;color:var(--muted2)}
.header-right a{color:var(--gold);text-decoration:none;font-weight:600}
.page{min-height:calc(100vh - 73px);display:flex;align-items:center;justify-content:center;padding:40px 20px}
.card{width:100%;max-width:420px;background:var(--s1);border:1px solid var(--border2);border-radius:var(--r);padding:36px 32px}
.card-title{font-family:'Bebas Neue';font-size:32px;letter-spacing:2px;color:var(--text);margin-bottom:6px}
.card-sub{font-size:13px;color:var(--muted2);line-height:1.6;margin-bottom:24px}
.btn-google{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;padding:12px;background:var(--s2);border:1px solid var(--border2);border-radius:var(--r-sm);font-size:14px;font-weight:500;color:var(--text);cursor:pointer;transition:background .2s;font-family:'Plus Jakarta Sans'}
.btn-google:hover{background:#1e1e30}
.or-div{display:flex;align-items:center;gap:12px;margin:18px 0;font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.or-div::before,.or-div::after{content:'';flex:1;height:1px;background:var(--border)}
.field-group{margin-bottom:14px}
.field-group label{display:block;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.field-group input{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 14px;font-size:14px;color:var(--text);font-family:'Plus Jakarta Sans';outline:none;transition:border-color .2s}
.field-group input:focus{border-color:var(--gold)}
.field-group input::placeholder{color:var(--muted)}
.forgot{display:block;text-align:right;font-size:12px;color:var(--muted);text-decoration:none;margin-top:6px;transition:color .15s}
.forgot:hover{color:var(--gold)}
.btn-submit{width:100%;padding:14px;background:var(--gold);border:none;border-radius:var(--r-sm);font-size:15px;font-weight:700;color:#08080e;cursor:pointer;font-family:'Plus Jakarta Sans';transition:background .18s;margin-top:18px}
.btn-submit:hover{background:var(--gold2)}
.btn-submit:disabled{opacity:0.4;pointer-events:none}
.msg{font-size:12px;text-align:center;margin-top:10px;padding:8px 12px;border-radius:var(--r-sm);display:none}
.msg.error{color:var(--orange);background:rgba(255,107,53,0.08);border:1px solid rgba(255,107,53,0.2);display:block}
.msg.success{color:var(--green);background:rgba(61,255,160,0.08);border:1px solid rgba(61,255,160,0.2);display:block}
.sign-up{text-align:center;font-size:13px;color:var(--muted2);margin-top:20px}
.sign-up a{color:var(--gold);text-decoration:none;font-weight:600}
@media(max-width:480px){.card{padding:28px 20px}header{padding:12px 16px}}
</style>
</head>
<body>
<header>
  <a class="logo" href="index.html"><img src="/logo-dark.png" alt="StudyFast"></a>
  <div class="header-right">No account? <a href="signup.html">Create one free</a></div>
</header>
<div class="page">
  <div class="card">
    <div class="card-title">Welcome back</div>
    <div class="card-sub">Log in to see your progress and continue training.</div>
    <button class="btn-google" id="btn-google">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
    <div class="or-div">or</div>
    <div class="field-group"><label>Email</label><input type="email" id="login-email" placeholder="your@email.com" autocomplete="email"></div>
    <div class="field-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="Your password" autocomplete="current-password">
      <a class="forgot" href="forgot.html">Forgot password?</a>
    </div>
    <button class="btn-submit" id="btn-login">LOG IN →</button>
    <div class="msg" id="login-msg"></div>
    <div class="sign-up">No account? <a href="signup.html">Create one free</a></div>
  </div>
</div>
<script>
const sb = supabase.createClient(
  'https://rsgctngtigaipxgwnmop.supabase.co',
  'sb_publishable_oLLAUCumx53xxJNmSZ1dBg_DDWv5xee'
);
const btn = document.getElementById('btn-login');
const msgEl = document.getElementById('login-msg');

function showMsg(text, type) { msgEl.textContent = text; msgEl.className = 'msg ' + type; }

document.getElementById('btn-google').addEventListener('click', async () => {
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/dashboard.html' }
  });
  if (error) showMsg(error.message, 'error');
});

document.getElementById('login-email').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('login-password').focus(); });
document.getElementById('login-password').addEventListener('keydown', e => { if (e.key === 'Enter') btn.click(); });

btn.addEventListener('click', async () => {
  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  msgEl.className = 'msg';
  if (!email || !email.includes('@')) return showMsg('Please enter a valid email address.', 'error');
  if (!password)                      return showMsg('Please enter your password.', 'error');
  btn.disabled = true; btn.textContent = 'Logging in...';
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) { btn.disabled = false; btn.textContent = 'LOG IN →'; return showMsg(error.message, 'error'); }
  showMsg('Logged in. Taking you to your dashboard...', 'success');
  setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
});
</script>
</body>
</html>
