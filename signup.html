<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account — StudyFast</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#08080e;--s1:#0f0f1a;--s2:#161625;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--gold:#F7A600;--gold2:#F7BD33;--text:#f2f1fc;--muted:#6a6a90;--muted2:#9090b0;--r:14px;--r-sm:8px;--green:#3dffa0;--orange:#ff6b35}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif}
header{padding:12px 32px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(8,8,14,0.88);backdrop-filter:blur(16px);position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo img{height:48px;opacity:0.92}
.header-right{font-size:13px;color:var(--muted2)}
.header-right a{color:var(--gold);text-decoration:none;font-weight:600}
.page{min-height:calc(100vh - 73px);display:flex;align-items:center;justify-content:center;padding:40px 20px}
.card{width:100%;max-width:420px;background:var(--s1);border:1px solid var(--border2);border-radius:var(--r);padding:36px 32px}
.card-title{font-family:'Bebas Neue';font-size:32px;letter-spacing:2px;color:var(--text);margin-bottom:6px}
.card-sub{font-size:13px;color:var(--muted2);line-height:1.6;margin-bottom:20px}
.benefits{display:flex;flex-direction:column;gap:8px;margin-bottom:22px}
.benefit{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted2)}
.benefit-dot{width:16px;height:16px;border-radius:50%;background:rgba(247,166,0,0.12);border:1px solid rgba(247,166,0,0.25);display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--gold);flex-shrink:0}
.btn-google{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;padding:12px;background:var(--s2);border:1px solid var(--border2);border-radius:var(--r-sm);font-size:14px;font-weight:500;color:var(--text);cursor:pointer;transition:background .2s;font-family:'Plus Jakarta Sans'}
.btn-google:hover{background:#1e1e30}
.or-div{display:flex;align-items:center;gap:12px;margin:18px 0;font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.or-div::before,.or-div::after{content:'';flex:1;height:1px;background:var(--border)}
.field-group{margin-bottom:14px}
.field-group label{display:block;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.field-group input{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 14px;font-size:14px;color:var(--text);font-family:'Plus Jakarta Sans';outline:none;transition:border-color .2s}
.field-group input:focus{border-color:var(--gold)}
.field-group input::placeholder{color:var(--muted)}
.check-row{display:flex;align-items:flex-start;gap:10px;margin:18px 0;cursor:pointer}
.check-row input[type=checkbox]{width:16px;height:16px;margin-top:2px;flex-shrink:0;accent-color:var(--gold);cursor:pointer}
.check-row span{font-size:12px;color:var(--muted2);line-height:1.6}
.check-row a{color:var(--gold);text-decoration:none;font-weight:600}
.btn-submit{width:100%;padding:14px;background:var(--gold);border:none;border-radius:var(--r-sm);font-size:15px;font-weight:700;color:#08080e;cursor:pointer;font-family:'Plus Jakarta Sans';transition:background .18s;margin-top:4px}
.btn-submit:hover{background:var(--gold2)}
.btn-submit:disabled{opacity:0.4;pointer-events:none}
.msg{font-size:12px;text-align:center;margin-top:10px;padding:8px 12px;border-radius:var(--r-sm);display:none}
.msg.error{color:var(--orange);background:rgba(255,107,53,0.08);border:1px solid rgba(255,107,53,0.2);display:block}
.msg.success{color:var(--green);background:rgba(61,255,160,0.08);border:1px solid rgba(61,255,160,0.2);display:block}
.sign-in{text-align:center;font-size:13px;color:var(--muted2);margin-top:20px}
.sign-in a{color:var(--gold);text-decoration:none;font-weight:600}
@media(max-width:480px){.card{padding:28px 20px}header{padding:12px 16px}}
</style>
</head>
<body>
<header>
  <a class="logo" href="index.html"><img src="/logo-dark.png" alt="StudyFast"></a>
  <div class="header-right">Already have an account? <a href="login.html">Log in</a></div>
</header>
<div class="page">
  <div class="card">
    <div class="card-title">Create account</div>
    <div class="card-sub">Free to join. Track your progress. Read faster.</div>
    <div class="benefits">
      <div class="benefit"><div class="benefit-dot">✓</div>WPM tracking across every session</div>
      <div class="benefit"><div class="benefit-dot">✓</div>7-day training history</div>
      <div class="benefit"><div class="benefit-dot">✓</div>All 7 training modes, free forever</div>
    </div>
    <button class="btn-google" id="btn-google">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
    <div class="or-div">or</div>
    <div class="field-group"><label>First name</label><input type="text" id="signup-name" placeholder="Jordan" autocomplete="given-name"></div>
    <div class="field-group"><label>Email</label><input type="email" id="signup-email" placeholder="your@email.com" autocomplete="email"></div>
    <div class="field-group"><label>Password</label><input type="password" id="signup-password" placeholder="Min. 6 characters" autocomplete="new-password"></div>
    <label class="check-row">
      <input type="checkbox" id="signup-consent">
      <span>I agree to the <a href="/terms" target="_blank">Terms and Conditions</a> and confirm StudyFast can send me training updates and offers.</span>
    </label>
    <button class="btn-submit" id="btn-signup">CREATE ACCOUNT →</button>
    <div class="msg" id="signup-msg"></div>
    <div class="sign-in">Already have an account? <a href="login.html">Log in</a></div>
  </div>
</div>
<script>
const sb = supabase.createClient(
  'https://rsgctngtigaipxgwnmop.supabase.co',
  'sb_publishable_oLLAUCumx53xxJNmSZ1dBg_DDWv5xee'
);
const btn = document.getElementById('btn-signup');
const msgEl = document.getElementById('signup-msg');

function showMsg(text, type) { msgEl.textContent = text; msgEl.className = 'msg ' + type; }

document.getElementById('btn-google').addEventListener('click', async () => {
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/plan.html' }
  });
  if (error) showMsg(error.message, 'error');
});

document.getElementById('signup-password').addEventListener('keydown', e => { if (e.key === 'Enter') btn.click(); });
document.getElementById('signup-name').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('signup-email').focus(); });
document.getElementById('signup-email').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('signup-password').focus(); });

btn.addEventListener('click', async () => {
  const name     = document.getElementById('signup-name').value.trim();
  const email    = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;
  const consent  = document.getElementById('signup-consent').checked;
  msgEl.className = 'msg';
  if (!name)                          return showMsg('Please enter your first name.', 'error');
  if (!email || !email.includes('@'))  return showMsg('Please enter a valid email address.', 'error');
  if (password.length < 6)            return showMsg('Password must be at least 6 characters.', 'error');
  if (!consent)                       return showMsg('Please agree to the Terms and Conditions to continue.', 'error');
  btn.disabled = true; btn.textContent = 'Creating account...';
  const { error } = await sb.auth.signUp({
    email, password,
    options: { data: { first_name: name, marketing_consent: true } }
  });
  if (error) { btn.disabled = false; btn.textContent = 'CREATE ACCOUNT →'; return showMsg(error.message, 'error'); }
  showMsg('Account created. Taking you to choose your plan...', 'success');
  setTimeout(() => { window.location.href = 'plan.html'; }, 1200);
});
</script>
</body>
</html>
